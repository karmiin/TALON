<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="TALON, Text Analysis and Latin Organization Network.">
  <title>TALON | Text Analysis and Latin Organization Network</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/ui.css">
</head>
<body data-current-view="home">
  <a class="skip-link" href="#main">Vai al contenuto</a>
  <aside class="app-sidebar app-rail" aria-label="Navigazione TALON">
    <a class="sidebar-brand brand" href="#" data-view="home" aria-label="TALON, home">
      <span class="brand-mark">TA</span>
      <span class="brand-copy">
        <strong>TALON</strong>
        <small>Latin research workspace</small>
      </span>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">Workspace</span>
        <button class="rail-button is-active" data-view="home" title="Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <strong>Dashboard</strong>
        </button>
        <button class="rail-button" data-view="library" title="Archivio testi">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5h6l2 2h10v10.5H3z"/><path d="M3 6.5V5h7l2 2h9v1.5"/></svg>
          <strong>Archivio testi</strong>
        </button>
        <button class="rail-button" data-view="editor" title="Editor e annotazioni">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10l4 4v14H5z"/><path d="M15 3v5h4M8 17l1-4 7-7 2 2-7 7z"/></svg>
          <strong>Editor</strong>
        </button>
        <button class="rail-button" data-view="pipeline" title="Pipeline report">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M8 6h8M7 8l4 8M17 8l-4 8"/></svg>
          <strong>Pipeline report</strong>
        </button>
        <button class="rail-button" data-view="reports" title="Archivio report">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10l4 4v14H5z"/><path d="M15 3v5h4M8 17v-3M12 17v-6M16 17v-8"/></svg>
          <strong>Report</strong>
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Analisi</span>
        <button class="rail-button" data-view="linguistics" title="Lessico e grammatica">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v16H4zM13 4h7v16h-7z"/><path d="M6.5 8.5h2M6.5 12h2M15.5 8.5h2M15.5 12h2M15.5 15.5h2"/></svg>
          <strong>Lessico e grammatica</strong>
        </button>
        <button class="rail-button" data-view="affinity" title="PCA">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3v17h17"/><circle cx="8" cy="15" r="1.5"/><circle cx="12" cy="9" r="1.5"/><circle cx="17" cy="12" r="1.5"/><circle cx="19" cy="6" r="1.5"/></svg>
          <strong>PCA</strong>
        </button>
        <button class="rail-button" data-view="legal" title="Termini giuridici">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M6 6h12M7 6l-4 7h8zM17 6l-4 7h8zM8 21h8"/></svg>
          <strong>Termini giuridici</strong>
        </button>
        <button class="rail-button" data-view="diff" title="Differenze tra testi">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v16H4zM14 4h6v16h-6zM7 8h1M7 12h1M16 9h1M16 14h1"/></svg>
          <strong>Confronto testi</strong>
        </button>
        <button class="rail-button" data-view="voyant" title="Voyant Tools">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10M9 20V4M14 20v-7M19 20V7"/></svg>
          <strong>Voyant</strong>
        </button>
        <button class="rail-button" data-view="collatinus" title="Collatinus">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5.5c3-1.5 6-1 9 1.5v13c-3-2.5-6-3-9-1.5zM21 5.5c-3-1.5-6-1-9 1.5v13c3-2.5 6-3 9-1.5z"/></svg>
          <strong>Collatinus</strong>
        </button>
      </div>

      <div class="nav-section nav-section-system">
        <span class="nav-section-label">Sistema</span>
        <button class="rail-button" data-view="modules" title="Catalogo moduli">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><path d="M17 14v6M14 17h6"/></svg>
          <strong>Moduli</strong>
        </button>
      </div>
    </nav>
  </aside>

  <header class="site-header">
    <button class="header-menu-button" id="nav-toggle" type="button" aria-label="Riduci navigazione" aria-expanded="true">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <div class="header-context">
      <strong id="current-view-title">Dashboard</strong>
    </div>
    <div class="header-actions">
      <button class="primary-button" id="open-import" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
        Importa testo
      </button>
    </div>
  </header>

  <main id="main">
    <div id="dynamic-tool-views"></div>

  </main>

  <dialog id="import-dialog">
    <form id="import-form">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">Nuovo documento</p>
          <h2>Importa una trascrizione</h2>
        </div>
        <button class="icon-button" type="button" data-close-dialog aria-label="Chiudi">x</button>
      </div>
      <div class="import-choice" role="tablist" aria-label="Tipo di importazione">
        <button type="button" class="choice-button is-active" data-import-mode="file">File Word, TXT o PDF</button>
        <button type="button" class="choice-button" data-import-mode="paste">Incolla testo</button>
      </div>
      <label class="drop-zone" id="file-zone">
        <input id="import-file" name="file" type="file" accept=".docx,.txt,.pdf">
        <strong>Scegli un file .docx, .txt o .pdf</strong>
        <span>Il file originale viene conservato con hash SHA-256. I PDF devono contenere testo estraibile; le scansioni richiedono OCR prima dell'import.</span>
      </label>
      <div class="import-backend-status" id="import-backend-status">
        Controllo supporto PDF...
      </div>
      <label class="field is-hidden" id="paste-zone">
        <span>Trascrizione originale</span>
        <small class="field-help">Nel linguaggio filologico puo essere chiamata anche "testo diplomatico".</small>
        <textarea id="import-text" rows="8" placeholder="Incolla qui il testo come e stato trascritto..."></textarea>
      </label>
      <div class="form-grid">
        <label class="field span-2">
          <span>Titolo *</span>
          <input id="import-title" name="title" required>
        </label>
        <label class="field">
          <span>Copia, testimone o segnatura</span>
            <input id="import-witness" name="witness">
        </label>
        <label class="field">
          <span>Autore o attribuzione</span>
          <input id="import-author" name="author" placeholder="ignoto">
        </label>
        <label class="field">
          <span>Datazione</span>
          <input id="import-date" name="date_label" placeholder="es. 774-897">
        </label>
        <label class="field">
          <span>Periodo</span>
          <select id="import-period" name="period">
            <option value="">Da verificare</option>
            <option>classico</option>
            <option>tardoantico</option>
            <option>alto medioevo</option>
            <option>basso medioevo</option>
            <option>umanistico / moderno</option>
          </select>
        </label>
        <label class="field">
          <span>Luogo / provenienza</span>
          <input id="import-place" name="place">
        </label>
        <label class="field">
          <span>Genere</span>
          <input id="import-genre" name="genre" placeholder="es. carta di vendita">
        </label>
        <label class="field span-2">
          <span>Note sul file e sulla trascrizione</span>
          <textarea id="import-notes" name="notes" rows="3"></textarea>
        </label>
      </div>
      <div class="dialog-actions">
        <p id="import-status" class="form-status" role="status"></p>
        <button type="button" class="secondary-button" data-close-dialog>Annulla</button>
        <button type="submit" class="primary-button">Importa nella raccolta</button>
      </div>
    </form>
  </dialog>

  <dialog id="document-dialog" class="document-dialog">
    <div id="document-content"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
