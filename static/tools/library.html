<section class="app-view" id="view-library">
  <div class="workspace-hero">
    <div>
      <p class="eyebrow">Archivio</p>
      <h1>Documenti</h1>
      <p class="workspace-copy">Gestione delle trascrizioni e dei metadati.</p>
    </div>
  </div>

  <section class="panel corpus-panel">
    <div class="panel-heading corpus-toolbar">
      <div>
        <p class="eyebrow">Archivio di lavoro</p>
        <h2>Documenti</h2>
      </div>
      <label class="search-box">
        <span class="sr-only">Filtra documenti</span>
        <input id="document-filter" type="search" placeholder="Cerca titolo, luogo, genere...">
      </label>
    </div>
    <div id="document-list" class="document-list" aria-live="polite"></div>
  </section>

  <dialog id="delete-document-dialog" class="confirm-dialog">
    <div class="dialog-heading">
      <div>
        <p class="eyebrow">Rimozione documento</p>
        <h2>Eliminare il testo?</h2>
      </div>
      <button class="icon-button" type="button" data-cancel-document-delete aria-label="Chiudi">x</button>
    </div>
    <p id="delete-document-message"></p>
    <p class="muted">Verranno eliminate anche le annotazioni e le analisi salvate che dipendono da questo testo. L'operazione non puo essere annullata.</p>
    <div class="dialog-actions">
      <button class="secondary-button" type="button" data-cancel-document-delete>Annulla</button>
      <button class="danger-button" id="confirm-document-delete" type="button">Elimina definitivamente</button>
    </div>
  </dialog>
</section>
