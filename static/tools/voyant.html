<section class="app-view" id="view-voyant">
  <header class="tool-page-header">
    <div>
      <p class="eyebrow">Integrazione esterna</p>
      <h1>Voyant workspace</h1>
      <p>Pannello Voyant integrato sui testi selezionati, senza passare il corpus nell'URL.</p>
    </div>
  </header>
  <div class="tool-workspace">
    <aside class="panel tool-controls">
      <h2>Corpus</h2>
      <div id="voyant-document-list" class="check-list"></div>
      <label class="field">
        <span>Tool Voyant</span>
        <select id="voyant-tool-select">
          <option value="Cirrus">Cirrus</option>
          <option value="Reader">Reader</option>
          <option value="Contexts">Contexts</option>
          <option value="Trends">Trends</option>
        </select>
      </label>
      <button class="primary-button full-width" id="open-voyant-tool">Apri in TALON</button>
      <button class="secondary-button full-width" id="open-voyant-window">Apri in nuova finestra</button>
    </aside>
    <div class="tool-results" id="voyant-tool-results">
      <div class="empty-state panel">
        <span class="empty-glyph">V</span>
        <h2>Seleziona un corpus</h2>
        <p>Il corpus viene inviato a Voyant tramite POST dentro il pannello integrato.</p>
      </div>
    </div>
  </div>
</section>
