<section class="app-view" id="view-diff">
  <header class="tool-page-header">
    <div>
      <p class="eyebrow">Collazione visuale</p>
      <h1>Differenze tra due testi</h1>
      <p>Seleziona due trascrizioni e visualizza sostituzioni, omissioni e aggiunte.</p>
    </div>
  </header>
  <div class="tool-workspace">
    <aside class="panel tool-controls">
      <h2>Testi</h2>
      <div id="diff-document-list" class="check-list"></div>
      <fieldset class="normalization-box">
        <legend>Pulizia prima del confronto</legend>
        <label><input id="diff-lower" type="checkbox" checked> Minuscole</label>
        <label><input id="diff-ji" type="checkbox"> j -> i</label>
        <label><input id="diff-vu" type="checkbox"> v -> u</label>
      </fieldset>
      <button class="primary-button full-width" id="run-diff-tool">Confronta differenze</button>
    </aside>
    <div class="tool-results" id="diff-tool-results">
      <div class="empty-state panel">
        <span class="empty-glyph">D</span>
        <h2>Seleziona due testi</h2>
        <p>Le differenze verranno evidenziate in due colonne affiancate.</p>
      </div>
    </div>
  </div>
</section>
