<section class="app-view" id="view-legal">
  <header class="tool-page-header">
    <div>
      <p class="eyebrow">Tool terminologico</p>
      <h1>Termini giuridici nei testi selezionati</h1>
      <p>Conteggi per documento/autore e lettura con occorrenze evidenziate.</p>
    </div>
  </header>
  <div class="tool-workspace">
    <aside class="panel tool-controls">
      <h2>Testi</h2>
      <div id="legal-document-list" class="check-list"></div>
      <h2>Analisi</h2>
      <label class="field">
        <span>Parser / lemmatizzatore</span>
        <select id="legal-parser-select"></select>
      </label>
      <label class="field">
        <span>Termini o famiglie</span>
        <textarea id="legal-tool-terms" rows="5" placeholder="Vuoto = famiglie base. Oppure termini separati da virgola o a capo."></textarea>
      </label>
      <button class="primary-button full-width" id="run-legal-tool">Analizza termini</button>
    </aside>
    <div class="tool-results" id="legal-tool-results">
      <div class="empty-state panel">
        <span class="empty-glyph">J</span>
        <h2>Seleziona i testi</h2>
        <p>Il tool mostrerà conteggi, aggregazione per autore e lettura dei testi con evidenziazione delle occorrenze.</p>
      </div>
    </div>
  </div>
</section>
