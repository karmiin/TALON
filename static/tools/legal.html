<section class="app-view" id="view-legal">
  <header class="tool-page-header">
    <div>
      <p class="eyebrow">Analisi terminologica</p>
      <h1>Termini giuridici</h1>
      <p>Leggi le occorrenze nel testo e verifica a quale famiglia terminologica appartengono.</p>
    </div>
  </header>
  <div class="tool-workspace">
    <aside class="panel tool-controls legal-controls">
      <div class="legal-control-heading">
        <h2>Documenti</h2>
        <span id="legal-selection-count">0 selezionati</span>
      </div>
      <div id="legal-document-list" class="check-list"></div>
      <div class="legal-selection-actions">
        <button class="text-button" id="legal-select-all" type="button">Seleziona tutti</button>
        <button class="text-button" id="legal-select-none" type="button">Deseleziona</button>
      </div>
      <details class="legal-analysis-options">
        <summary>Impostazioni analisi</summary>
        <label class="field">
          <span>Parser / lemmatizzatore</span>
          <select id="legal-parser-select"></select>
        </label>
        <label class="field">
          <span>Vocabolario personalizzato</span>
          <textarea id="legal-tool-terms" rows="4" placeholder="Termini separati da virgola o a capo"></textarea>
          <small class="field-help">Se vuoto, viene usato il vocabolario giuridico del progetto.</small>
        </label>
      </details>
      <button class="primary-button full-width" id="run-legal-tool">Analizza termini</button>
    </aside>
    <div class="tool-results" id="legal-tool-results">
      <div class="empty-state panel legal-empty-state">
        <h2>Le occorrenze appariranno qui</h2>
        <p>Seleziona uno o più documenti per leggerli con i termini giuridici evidenziati.</p>
      </div>
    </div>
  </div>
</section>
