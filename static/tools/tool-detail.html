<section class="app-view" id="view-tool-detail">
  <header class="tool-page-header">
    <div>
      <p class="eyebrow">Tool registrato</p>
      <h1 id="tool-detail-title">Scheda tool</h1>
      <p id="tool-detail-description">Dettagli del tool selezionato dal catalogo moduli.</p>
    </div>
  </header>
  <div class="tool-workspace">
    <aside class="panel tool-controls">
      <h2>Metadati</h2>
      <div id="tool-detail-meta" class="module-summary"></div>
      <button class="secondary-button full-width" data-view="home">Torna all'hub</button>
    </aside>
    <div class="tool-results" id="tool-detail-results">
      <div class="empty-state panel">
        <span class="empty-glyph">T</span>
        <h2>Tool dal manifest</h2>
        <p>Questa scheda mostra input, output e riferimenti finche non viene collegata una vista personalizzata.</p>
      </div>
    </div>
  </div>
</section>
